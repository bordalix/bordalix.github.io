<style>
  {% include css/box.css %}
  {% include css/project.css %}
</style>

<script>
  {% include js/box.js %}
</script>

<section>
  <div class="container">
    <h1>Portfolio</h1>
    <h2>Stuff I made recently</h2>
  </div>
  <p>
    {% for project in site.portfolio %}
      <a href="/portfolio/{{project.blob}}.html" aria-label="{{project.name}}">
        <div class="box {{project.blob}}" data-bg-image="{{project.blob}}">
          <div class="box_text">
            <h3>{{ project.name }}</h3>
          </div>
        </div>
      </a>
    {% endfor %}
  </p>
  <div style="clear: both"></div>
</section>
