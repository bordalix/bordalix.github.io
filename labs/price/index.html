<head>
  <meta charset="utf-8" />
  <title>BTC price</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <script>
    const fetchPrice = async () => {
      const url = 'https://btcoracle.bordalix.workers.dev/'
      const options = {
        headers: {
          'Content-Type': 'application/json',
        },
      }
      try {
        const res = await fetch(url, options)
        return await res.json()
      } catch (error) {
        console.warn(`error fetching ${url}`, error)
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {
      const { pricefeed } = await fetchPrice()
      document.getElementById('usd').innerText = `$ ${pricefeed.usd}`
      document.getElementById('eur').innerText = `€ ${pricefeed.eur}`
    })
  </script>

  <div class="container">
    <h1 class="heading">Bitcoin price</h1>
    <section>
      <p id="usd">$ _____.__</p>
      <p id="eur">€ _____.__</p>
      <p>Median price from a dozen sources</p>
      <p>
        <a href="https://github.com/bordalix/btcoracle">github</a>
      </p>
    </section>
  </div>
</body>
