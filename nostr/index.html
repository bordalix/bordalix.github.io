---
title: João Bordalo
layout: main
---

<script src="https://bundle.run/buffer@6.0.3"></script>
<script src="https://bundle.run/bech32@2.0.0"></script>
<script src="https://nostr-utils.pages.dev/js/jquery-3.6.2.min.js"></script>
<script src="https://nostr-utils.pages.dev/js/nostr-utils.js"></script>

<style>
  section.user > div {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 2rem;
    & p.pic {
      height: 10rem;
      width: 10rem;
      & img {
        border-radius: 50%;
        border: 1px solid silver;
        object-fit: cover;
        height: 100%;
        width: 100%;
      }
    }
    & > div {
      align-items: center;
      display: flex;
      justify-content: flex-end;
       & div:first-child p {
        color: var(--black);
        font-weight: 700;
        padding-right: 1rem;
        text-align: right;
      }
      & p {
        font-size: 1rem;
        margin-bottom: 0.21rem;
      }
    }
  }
  @media (max-width: 440px) {
    section.user > div {
      flex-direction: column;
       &:first-child {
        flex-direction: row;
      }
      & > p {
        margin: auto;
      }
      & > div {
        justify-content: center;
      }
    }
  }
  article.note {
    margin-bottom: 5rem;
    & h2 {
      overflow: hidden;
      margin-bottom: 0.7rem;
      text-overflow: ellipsis;
    }

    & p.content {
      overflow: hidden;
      text-overflow: ellipsis;
    }
  }
  p.music {
    gap: 0.25rem;
    font-size: 0.8rem;
    margin-top: -2rem;
    color: var(--zinc);
    margin-bottom: 2rem;
    align-items: center;
    justify-content: start;
  }
</style>

<template id="user">
  <section class="user">
    <div>
      <h2 class="dis"></h2>
      <p style="font-size: 0.8rem">
        <a href="/articles/2023/11/26/what_is_nostr.html">What is Nostr?</a>
      </p>
    </div>
    <p class="music" style="display: none">
      {% include /svg/music.svg %}
      <span></span>
    </p>
    <div>
      <p class="pic"></p>
      <div>
        <div>
          <p>name:</p>
          <p>about:</p>
          <p>nip05:</p>
          <p>lud16:</p>
          <p>website:</p>
          <p>username:</p>
        </div>
        <div>
          <p class="nam">&nbsp;</p>
          <p class="abo">&nbsp;</p>
          <p class="nip">&nbsp;</p>
          <p class="lud">&nbsp;</p>
          <p class="web">&nbsp;</p>
          <p class="usr">&nbsp;</p>
        </div>
      </div>
    </div>
  </section>
</template>

<template id="note">
  <article class="note">
    <h2>Note</h2>
    <div class="metainfo">
      <div>
        <p>
          <time datetime="{{ foo.date }}" class="timeago">{{ foo.date }}</time>
          <span class="only-if-js">&middot;</span>
          <span class="listen only-if-js false-link">listen</span>
          <span class="stop only-if-js false-link" style="display: none">stop</span>
        </p>
      </div>
      <div>
        <p class="read"></p>
        <p class="link"></p>
      </div>
    </div>
    <p class="content"></p>
  </article>
</template>

<section
  id="nostr"
  tabindex="0"
  style="margin-top: 0">
  <div class="container" id="postsList">
    <h1>Nostr</h1>
    <h2>Last 7 days on Nostr</h2>
    <p id="loadingProfile">Loading profile {% include /svg/loading.svg %}</p>
    <div id="profileInfo"></div>
    <p id="loadingNotes">Loading notes {% include /svg/loading.svg %}</p>
    <div id="notesContainer"></div>
  </div>
</section>

<script>
  const relays = [
    'wss://nos.lol',
    // 'wss://relay.damus.io',
    // 'wss://relay.primal.net',
    // 'wss://relay.noswhere.com',
    // 'wss://relay.bitcoinpark.com',
  ]

  let pubkey = '62cef883863022a4f1d60d54857c9d729650702c9fe227b0988c0b6e36c4bcce'

  if (!window.location.search) {
    window.location.href = window.location.href + `?${pubkey}`
  } else {
    pubkey = window.location.search.substring(1)
    if (/^npub/.test(pubkey)) {
      window.location.search = `?${npub2hexa(pubkey)}`
    }
    if (/^.+@.+$/.test(pubkey)) {
    const [name, domain] = pubkey.split('@')
    fetch(`https://${domain}/.well-known/nostr.json?name=${name}`)
      .then((response) => response.json())
      .then((data) => {
        if (!data || !data.names || !data.names[name]) return
        window.location.search = `?${data.names[name]}`
      })
  }}

  const pretty = {
    date: (unix) => {
      return new Date(unix * 1000).toLocaleDateString('en-us', {
        weekday: 'long',
        year: 'numeric',
        month: 'short',
        day: 'numeric',
      })
    },
    hour: (unix) => {
      return new Date(unix * 1000).toLocaleTimeString('en-us', {
        timeZone: 'UTC',
        timeZoneName: 'short',
      })
    },
    html: (content) => {
      if (content.match(/https:\/\//)) {
        for (const match of content.match(/https:\/\/.*/g)) {
          content = content.replace(match, `<a href="${match}">${match}</a>`)
        }
      }
      if (content.match(/nostr:/)) {
        for (const match of content.match(/nostr:.*/g)) {
          const id = match.split(':')[1]
          content = content.replace(match, `<a href="https://nhopper.pages.dev/?${id}">${match}</a>`)
        }
      }
      return content.replace(/\n/g, '<br />')
    },
    link: (note) => {
      const text = `link to ${note.tags?.length == 0 ? 'note' : 'reply'}`
      return `<a href="https://nhopper.pages.dev/?${note.id}">${text}</a>`
    },
  }

  // get user profile
  getEvents({ authors: [pubkey], kinds: [0] }).then((events) => {
    document.querySelector('#loadingProfile').remove()
    const mostRecent = events.reduce((prev, curr) => (curr.created_at > prev.created_at ? curr : prev))
    const { about, displayName, lud16, name, nip05, picture, username, website } = JSON.parse(mostRecent.content)
    const npub = hexa2npub(pubkey)
    const clone = document.querySelector('#user').content.cloneNode(true)
    const url = 'https://nhopper.pages.dev/'
    if (about) clone.querySelector('.abo').innerText = about
    if (displayName) clone.querySelector('.dis').innerText = displayName
    if (picture) clone.querySelector('.pic').innerHTML = `<img src="${picture}">`
    if (name) clone.querySelector('.nam').innerHTML = `<a href="${url}?${npub}">${name}</a>`
    if (nip05) clone.querySelector('.nip').innerHTML = `<a href="${url}?${nip05}">${nip05}</a>`
    if (lud16) clone.querySelector('.lud').innerHTML = `${lud16} ⚡`
    if (website) clone.querySelector('.web').innerHTML = `<a href="${url}?${website}">${website}</a>`
    if (username) clone.querySelector('.usr').innerText = username
    document.querySelector('#profileInfo').appendChild(clone)
  })

  // get current music playing
  const tenMinsAgo = Math.floor(Date.now() / 1000 - 10 * 60)
  getEvents({ authors: [pubkey], kinds: [30315], since: tenMinsAgo }).then((events) => {
    if (events.length === 0) return
    const mostRecent = events.reduce((prev, curr) => (curr.created_at > prev.created_at ? curr : prev))
    document.querySelector('.music span').innerHTML = mostRecent.content
    document.querySelector('.music').style.display = 'flex'
  })

  // get events from relays
  const aWeekAgo = Math.floor(Date.now() / 1000 - 7 * 24 * 60 * 60)
  getEvents({ authors: [pubkey], kinds: [1], since: aWeekAgo }).then((data) => {
    notesContainer = document.querySelector('#notesContainer')
    document.querySelector('#loadingNotes').remove()
    if (data.length === 0) {
      const p = document.createElement('p')
      p.innerText = '<empty>'
      notesContainer.appendChild(p)
    }
    data
      .sort((a, b) => b.created_at - a.created_at)
      .map((note) => {
        const lines = note.content.split('\n')
        const title = lines.find((line) => line.length > 0)
        const clone = document.querySelector('#note').content.cloneNode(true)
        const m = Math.ceil(note.content.split(' ').length / 150)
        clone.querySelector('h2').innerHTML = title.replace(/:$/, '')
        clone.querySelector('time').innerHTML = pretty.date(note.created_at)
        clone.querySelector('.read').innerHTML = `${m} minute${m === 1 ? '' : 's'} read`
        clone.querySelector('.link').innerHTML = pretty.link(note)
        clone.querySelector('.content').innerHTML = pretty.html(note.content)
        notesContainer.appendChild(clone)
      })
  })
</script>
